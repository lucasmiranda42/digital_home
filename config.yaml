languages:
  en:
    title : "Lucas Miranda"
    disabled: false
    languageName: "English"
    contentDir: content/en
    languageCode: en-us
    weight: 1
    params:
      languageAltTitle: 🇬🇧
      homeInfoParams:
        Title: Lucas Miranda
        Content: >
          I am a postdoctoral researcher at [EPFL MLBio](https://brbiclab.epfl.ch/), directed by Maria Brbić.
          Previously, I was a postdoctoral researcher at the [Max Planck Institute of Biochemistry](https://www.biochem.mpg.de/en) (MLSB, Karsten Borgwardt).
          I obtained my PhD in 2024 from the Technical University of Munich (TUM), under the supervision of Bertram Müller-Myhsok.
          My research focuses on the development of machine learning methods for biochemical and medical informatics problems, with a special focus on spatial omics.
        imageUrl: "profile.png"
        imageTitle: ProfileMode image
        imageWidth: 180
        imageHeight: 180
