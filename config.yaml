        Title: Lucas Miranda
        Content: >
          Soy investigador postdoctoral en [EPFL MLBio](https://brbiclab.epfl.ch/), dirigido por Maria Brbić.
          Antes también fui postdoc en el [Instituto Max Planck de Bioquímica](https://www.biochem.mpg.de/en) (MLSB, Karsten Borgwardt).
          Obtuve mi doctorado en 2024 de la Universidad Técnica de Munich (TUM), bajo la supervisión de Bertram Müller-Myhsok.
          Mi investigación se centra en el desarrollo de métodos de aprendizaje automático para problemas de bioinformática y medicina, con un enfoque particular en ómicas espaciales.
